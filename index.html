<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fashion World — MVP</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F5F0E8;
      --black: #0A0A0A;
      --gold: #C9A84C;
      --gold-light: #E8D5A0;
      --muted: #7A7570;
      --panel: rgba(10,10,10,0.85);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--black);
      color: var(--cream);
      font-family: 'Montserrat', sans-serif;
      overflow: hidden;
    }

    /* ── Canvas ── */
    #canvas-container {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    #canvas-container canvas {
      width: 100% !important;
      height: 100% !important;
    }

    /* ── Top bar ── */
    #topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
      background: linear-gradient(to bottom, rgba(10,10,10,0.7), transparent);
    }
    #logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: var(--cream);
    }
    #logo span { color: var(--gold); }

    /* ── Status pill ── */
    #status-pill {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid var(--gold);
      padding: 5px 14px;
      border-radius: 20px;
      opacity: 0.8;
    }

    /* ── Sidebar panel ── */
    #sidebar {
      position: absolute;
      top: 50%;
      right: 32px;
      transform: translateY(-50%);
      z-index: 10;
      width: 220px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .panel-section {
      background: var(--panel);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 12px;
      padding: 16px;
      backdrop-filter: blur(12px);
    }

    .panel-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }

    /* ── Body sliders ── */
    .slider-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      gap: 8px;
    }
    .slider-row label {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      min-width: 56px;
    }
    .slider-row input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 2px;
      background: rgba(201,168,76,0.25);
      border-radius: 2px;
      outline: none;
    }
    .slider-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--gold);
      cursor: pointer;
    }

    /* ── Outfit slots ── */
    .outfit-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .outfit-slot {
      aspect-ratio: 1;
      border: 1px dashed rgba(201,168,76,0.3);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 8px 4px;
      gap: 4px;
    }
    .outfit-slot:hover {
      border-color: var(--gold);
      background: rgba(201,168,76,0.05);
      color: var(--gold-light);
    }
    .outfit-slot.filled {
      border-color: var(--gold);
      border-style: solid;
      background: rgba(201,168,76,0.08);
      color: var(--gold-light);
    }
    .slot-icon {
      font-size: 18px;
      line-height: 1;
    }

    /* ── CTA Button ── */
    .cta-btn {
      width: 100%;
      padding: 12px;
      background: var(--gold);
      border: none;
      border-radius: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--black);
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .cta-btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .cta-btn:active { transform: translateY(0); }
    .cta-btn.secondary {
      background: transparent;
      border: 1px solid rgba(201,168,76,0.4);
      color: var(--gold-light);
    }

    /* ── Avatar creator overlay ── */
    #avatar-overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.92);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    #avatar-overlay.active { display: flex; }
    #avatar-overlay h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--cream);
    }
    #avatar-overlay p {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-align: center;
      max-width: 360px;
      line-height: 1.7;
    }
    #rpm-frame {
      width: min(640px, 92vw);
      height: min(500px, 70vh);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 16px;
      overflow: hidden;
    }
    #overlay-close {
      position: absolute;
      top: 20px; right: 24px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
    }
    #overlay-close:hover { color: var(--cream); }

    /* ── Bottom bar ── */
    #bottombar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
      background: linear-gradient(to top, rgba(10,10,10,0.7), transparent);
    }
    #hint {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    #bag-count {
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 0.1em;
    }

    /* ── Loading screen ── */
    #loading {
      position: absolute;
      inset: 0;
      z-index: 200;
      background: var(--black);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.8s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: var(--cream);
    }
    #loading-logo span { color: var(--gold); }
    .loading-bar-track {
      width: 200px;
      height: 1px;
      background: rgba(255,255,255,0.1);
      border-radius: 1px;
      overflow: hidden;
    }
    .loading-bar-fill {
      height: 100%;
      background: var(--gold);
      border-radius: 1px;
      animation: loadbar 2s ease-out forwards;
    }
    @keyframes loadbar { from { width: 0; } to { width: 100%; } }
    #loading-sub {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Notification toast ── */
    #toast {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--panel);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--gold-light);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 50;
      white-space: nowrap;
      backdrop-filter: blur(12px);
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <div id="loading-logo">FASHION<span>WORLD</span></div>
  <div class="loading-bar-track"><div class="loading-bar-fill"></div></div>
  <div id="loading-sub">Preparing your world</div>
</div>

<!-- 3D canvas -->
<div id="canvas-container"></div>

<!-- Top bar -->
<div id="topbar">
  <div id="logo">FASHION<span>WORLD</span></div>
  <div id="status-pill">MVP · Week 1</div>
</div>

<!-- Sidebar -->
<div id="sidebar">

  <div class="panel-section">
    <div class="panel-label">Your avatar</div>
    <button class="cta-btn" id="btn-create-avatar">Create my avatar</button>
    <div style="height:8px"></div>
    <button class="cta-btn secondary" id="btn-reset-avatar">Reset</button>
  </div>

  <div class="panel-section">
    <div class="panel-label">Body shape</div>
    <div class="slider-row">
      <label>Height</label>
      <input type="range" id="sl-height" min="0" max="100" value="50">
    </div>
    <div class="slider-row">
      <label>Build</label>
      <input type="range" id="sl-build" min="0" max="100" value="40">
    </div>
  </div>

  <div class="panel-section">
    <div class="panel-label">Outfit</div>
    <div class="outfit-grid">
      <div class="outfit-slot" id="slot-top" onclick="pickItem('top')">
        <span class="slot-icon">👕</span>
        <span>Top</span>
      </div>
      <div class="outfit-slot" id="slot-bottom" onclick="pickItem('bottom')">
        <span class="slot-icon">👖</span>
        <span>Bottom</span>
      </div>
      <div class="outfit-slot" id="slot-shoes" onclick="pickItem('shoes')">
        <span class="slot-icon">👟</span>
        <span>Shoes</span>
      </div>
      <div class="outfit-slot" id="slot-bag" onclick="pickItem('bag')">
        <span class="slot-icon">👜</span>
        <span>Bag</span>
      </div>
    </div>
  </div>

  <div class="panel-section">
    <div class="panel-label">Shopping bag <span id="bag-counter" style="color:var(--gold)">0</span></div>
    <button class="cta-btn" id="btn-buy" onclick="checkout()">Buy outfit →</button>
  </div>

</div>

<!-- Bottom bar -->
<div id="bottombar">
  <div id="hint">Drag to rotate · Scroll to zoom</div>
  <div id="bag-count">0 items in bag</div>
</div>

<!-- Avatar creator overlay -->
<div id="avatar-overlay">
  <button id="overlay-close" onclick="closeOverlay()">✕</button>
  <h2>Create your avatar</h2>
  <p>Customize your look. When you're done, your avatar will appear in your fashion world.</p>
  <iframe id="rpm-frame"
    src="https://demo.readyplayer.me/avatar?frameApi"
    allow="camera *; microphone *">
  </iframe>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ── State ──────────────────────────────────────────────────────────────
const state = {
  avatarUrl: null,
  outfit: { top: null, bottom: null, shoes: null, bag: null },
  bagCount: 0,
};

// Sample catalog (in real MVP these come from a brand API)
const catalog = {
  top:    [{ name: 'White linen shirt', price: '$89', brand: 'Zara' }, { name: 'Black blazer', price: '$220', brand: 'Mango' }],
  bottom: [{ name: 'Wide leg trousers', price: '$110', brand: 'Zara' }, { name: 'Midi skirt', price: '$95', brand: 'H&M' }],
  shoes:  [{ name: 'Leather loafers', price: '$180', brand: 'Massimo' }, { name: 'White sneakers', price: '$130', brand: 'Nike' }],
  bag:    [{ name: 'Mini tote', price: '$65', brand: 'Zara' }, { name: 'Leather clutch', price: '$140', brand: 'Mango' }],
};

// ── Three.js Setup ─────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer  = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.outputEncoding = THREE.sRGBEncoding;
container.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);
scene.fog = new THREE.Fog(0x0a0a0a, 8, 20);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.6, 3.2);
camera.lookAt(0, 1.0, 0);

// Lighting
const ambientLight = new THREE.AmbientLight(0xfff8e7, 0.6);
scene.add(ambientLight);

const keyLight = new THREE.DirectionalLight(0xfff5d6, 1.8);
keyLight.position.set(2, 4, 2);
keyLight.castShadow = true;
scene.add(keyLight);

const rimLight = new THREE.DirectionalLight(0xc9a84c, 0.6);
rimLight.position.set(-3, 2, -2);
scene.add(rimLight);

const fillLight = new THREE.PointLight(0x6688cc, 0.4, 8);
fillLight.position.set(-2, 1, 1);
scene.add(fillLight);

// Floor
const floorGeo  = new THREE.PlaneGeometry(10, 10);
const floorMat  = new THREE.MeshStandardMaterial({ color: 0x111108, roughness: 0.9, metalness: 0.1 });
const floor     = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Floor grid lines (runway feel)
const gridHelper = new THREE.GridHelper(10, 20, 0x2a2820, 0x1a1810);
scene.add(gridHelper);

// Avatar placeholder (mannequin-style shape until real avatar loads)
const mannequinGroup = new THREE.Group();

const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2a2520, roughness: 0.8, metalness: 0.1 });
const headGeo = new THREE.SphereGeometry(0.13, 16, 16);
const head    = new THREE.Mesh(headGeo, new THREE.MeshStandardMaterial({ color: 0xd4b896, roughness: 0.7 }));
head.position.y = 1.75;
head.castShadow = true;
mannequinGroup.add(head);

const torsoGeo = new THREE.CylinderGeometry(0.18, 0.15, 0.55, 12);
const torso    = new THREE.Mesh(torsoGeo, bodyMat);
torso.position.y = 1.30;
torso.castShadow = true;
mannequinGroup.add(torso);

const hipGeo = new THREE.CylinderGeometry(0.17, 0.16, 0.22, 12);
const hips   = new THREE.Mesh(hipGeo, bodyMat);
hips.position.y = 0.97;
mannequinGroup.add(hips);

const legMatL = bodyMat.clone();
const legGeo  = new THREE.CylinderGeometry(0.07, 0.055, 0.55, 10);
const legL    = new THREE.Mesh(legGeo, legMatL);
legL.position.set(-0.09, 0.58, 0);
mannequinGroup.add(legL);

const legR = legL.clone();
legR.position.set(0.09, 0.58, 0);
mannequinGroup.add(legR);

const shinGeo = new THREE.CylinderGeometry(0.055, 0.04, 0.45, 10);
const shinL   = new THREE.Mesh(shinGeo, bodyMat);
shinL.position.set(-0.09, 0.19, 0);
mannequinGroup.add(shinL);
const shinR = shinL.clone();
shinR.position.set(0.09, 0.19, 0);
mannequinGroup.add(shinR);

const armGeo = new THREE.CylinderGeometry(0.05, 0.04, 0.48, 10);
const armL   = new THREE.Mesh(armGeo, bodyMat);
armL.position.set(-0.27, 1.25, 0);
armL.rotation.z = 0.18;
mannequinGroup.add(armL);
const armR = armL.clone();
armR.position.set(0.27, 1.25, 0);
armR.rotation.z = -0.18;
mannequinGroup.add(armR);

scene.add(mannequinGroup);

// Orbit controls (manual, lightweight)
let isDragging = false, prevMouse = { x: 0, y: 0 };
let rotY = 0, rotX = 0.1, camDist = 3.2;

renderer.domElement.addEventListener('mousedown', e => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
renderer.domElement.addEventListener('touchstart', e => { isDragging = true; prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY }; });

window.addEventListener('mouseup',   () => isDragging = false);
window.addEventListener('touchend',  () => isDragging = false);

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  rotY += (e.clientX - prevMouse.x) * 0.008;
  rotX += (e.clientY - prevMouse.y) * 0.004;
  rotX  = Math.max(-0.3, Math.min(0.5, rotX));
  prevMouse = { x: e.clientX, y: e.clientY };
});
window.addEventListener('touchmove', e => {
  if (!isDragging) return;
  rotY += (e.touches[0].clientX - prevMouse.x) * 0.008;
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
});

renderer.domElement.addEventListener('wheel', e => {
  camDist = Math.max(1.5, Math.min(6, camDist + e.deltaY * 0.005));
});

// Height / build sliders affect mannequin scale
document.getElementById('sl-height').addEventListener('input', updateMannequin);
document.getElementById('sl-build').addEventListener('input',  updateMannequin);

function updateMannequin() {
  const h = document.getElementById('sl-height').value / 100;
  const b = document.getElementById('sl-build').value / 100;
  mannequinGroup.scale.y = 0.88 + h * 0.24;
  mannequinGroup.scale.x = 0.82 + b * 0.36;
  mannequinGroup.scale.z = 0.82 + b * 0.36;
}

// ── Animate ────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);

  // Slow auto-rotate when not dragging
  if (!isDragging) rotY += 0.003;

  // Update camera orbit
  camera.position.x = Math.sin(rotY) * camDist;
  camera.position.z = Math.cos(rotY) * camDist;
  camera.position.y = 1.6 + Math.sin(rotX) * camDist * 0.5;
  camera.lookAt(0, 1.0, 0);

  renderer.render(scene, camera);
}
animate();

// ── Responsive ────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Ready Player Me ────────────────────────────────────────────────────
window.addEventListener('message', e => {
  if (e.data?.source !== 'readyplayerme') return;
  if (e.data.eventName === 'v1.avatar.exported') {
    state.avatarUrl = e.data.data.url;
    closeOverlay();
    showToast('Avatar created! Loading into your world...');
    // In the full MVP, you load the GLB here with GLTFLoader
    // For now we confirm receipt and show the URL
    setTimeout(() => showToast('Avatar URL ready — next step: load GLB model'), 2000);
    console.log('Avatar GLB URL:', state.avatarUrl);
  }
});

// ── UI actions ────────────────────────────────────────────────────────
document.getElementById('btn-create-avatar').onclick = () => {
  document.getElementById('avatar-overlay').classList.add('active');
};
document.getElementById('btn-reset-avatar').onclick = () => {
  state.avatarUrl = null;
  state.outfit    = { top: null, bottom: null, shoes: null, bag: null };
  state.bagCount  = 0;
  updateBagUI();
  ['top','bottom','shoes','bag'].forEach(k => {
    document.getElementById('slot-' + k).classList.remove('filled');
    document.getElementById('slot-' + k).querySelector('span:last-child').textContent =
      k.charAt(0).toUpperCase() + k.slice(1);
  });
  updateMannequin();
  showToast('Reset — start fresh');
};

function closeOverlay() {
  document.getElementById('avatar-overlay').classList.remove('active');
}

function pickItem(slot) {
  const items   = catalog[slot];
  const picked  = items[Math.floor(Math.random() * items.length)];
  state.outfit[slot] = picked;
  state.bagCount++;
  updateBagUI();

  const el = document.getElementById('slot-' + slot);
  el.classList.add('filled');
  el.querySelector('span:last-child').textContent = picked.name.substring(0, 14) + (picked.name.length > 14 ? '…' : '');
  showToast(picked.name + ' · ' + picked.price + ' added');
}

function updateBagUI() {
  document.getElementById('bag-counter').textContent = state.bagCount;
  document.getElementById('bag-count').textContent   = state.bagCount + ' item' + (state.bagCount !== 1 ? 's' : '') + ' in bag';
}

function checkout() {
  const items = Object.values(state.outfit).filter(Boolean);
  if (items.length === 0) { showToast('Add items to your outfit first'); return; }
  const total = items.reduce((s, i) => s + parseInt(i.price.replace(/\D/g,'')), 0);
  showToast('Outfit total: $' + total + ' — checkout coming in Week 3');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Hide loading screen ────────────────────────────────────────────────
setTimeout(() => document.getElementById('loading').classList.add('hidden'), 2200);
</script>
</body>
</html>
